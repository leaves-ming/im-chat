logging:
  level:
    root: INFO
    com.ming.imchatserver: INFO

spring:
  cloud:
    openfeign:
      sentinel:
        enabled: true
      client:
        config:
          im-social-service:
            connectTimeout: ${IM_SOCIAL_CONNECT_TIMEOUT_MS:300}
            readTimeout: ${IM_SOCIAL_READ_TIMEOUT_MS:800}
    nacos:
      discovery:
        metadata:
          version: ${IM_INSTANCE_VERSION:1.0.0-SNAPSHOT}
          zone: ${IM_INSTANCE_ZONE:default}
          protocol: netty-ws-http
          startupTime: ${IM_INSTANCE_STARTUP_TIME:unknown}
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: ${IM_SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: ${IM_SENTINEL_PORT:8719}

im:
  instance:
    version: ${IM_INSTANCE_VERSION:1.0.0-SNAPSHOT}
    zone: ${IM_INSTANCE_ZONE:default}
    protocol: netty-ws-http
  netty:
    enabled: true
    port: ${IM_NETTY_PORT:8080}
    websocket-path: /ws
    reader-idle-seconds: 60
    writer-idle-seconds: 0
    all-idle-seconds: 120
    max-content-length: ${im.file.max-file-size-bytes:10485760}
    token-expire-seconds: 3600
    offline-pull-max-limit: 200
    single-chat-require-active-contact: false
    group-push-batch-size: 200
    group-push-parallelism: 4
    group-push-queue-capacity: 1000
    message-recall-window-seconds: 120
    origin-check-enabled: false
    origin-whitelist:
      - http://localhost:5173
      - http://127.0.0.1:5173
  file:
    local-base-dir: ${IM_FILE_LOCAL_BASE_DIR:data/uploads}
    public-url-prefix: /files
  sensitive:
    enabled: false
    mode: REJECT
    word-source: classpath:sensitive_words.txt
    fail-open: true
  redis:
    server-id: ${HOSTNAME:im-chat-server}
  metrics:
    sample-fixed-delay-ms: 10000
    log-fixed-delay-ms: 60000
  route:
    message:
      remote-enabled: ${IM_ROUTE_MESSAGE_REMOTE_ENABLED:false}
      fallback-to-local-on-error: ${IM_ROUTE_MESSAGE_FALLBACK_TO_LOCAL_ON_ERROR:true}
    social:
      remote-enabled: ${IM_ROUTE_SOCIAL_REMOTE_ENABLED:true}
      single-chat-permission-cache-ttl-seconds: ${IM_ROUTE_SOCIAL_SINGLE_CHAT_PERMISSION_CACHE_TTL_SECONDS:15}
      contact-active-cache-ttl-seconds: ${IM_ROUTE_SOCIAL_CONTACT_ACTIVE_CACHE_TTL_SECONDS:15}
      group-member-ids-cache-ttl-seconds: ${IM_ROUTE_SOCIAL_GROUP_MEMBER_IDS_CACHE_TTL_SECONDS:5}
      group-recall-permission-cache-ttl-seconds: ${IM_ROUTE_SOCIAL_GROUP_RECALL_PERMISSION_CACHE_TTL_SECONDS:5}
  platform:
    config:
      shared-data-id: im-shared.yaml
      service-data-id: im-chat-server.yaml
      hot-refresh-safe-prefixes:
        - im.observability.trace
        - im.observability.access-log-enabled
