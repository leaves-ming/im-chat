spring:
  cloud:
    openfeign:
      sentinel:
        enabled: true

im:
  gateway:
    access-log-enabled: true
    introspect-enabled: true
    relay-user-headers: true
    websocket-path: /ws
    backend-websocket-path: /ws-internal
    gateway-shared-secret: ${IM_GATEWAY_WS_SHARED_SECRET:PLEASE_REPLACE_GATEWAY_WS_SECRET}
