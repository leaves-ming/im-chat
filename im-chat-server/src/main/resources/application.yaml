spring:
  application:
    name: im-chat-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  main:
    web-application-type: none
  config:
    import:
      - optional:nacos:im-shared.yaml?group=${IM_NACOS_SHARED_GROUP:IM_PLATFORM}
      - optional:nacos:im-chat-server.yaml?group=${IM_NACOS_SERVICE_GROUP:IM_SERVICE}
  cloud:
    compatibility-verifier:
      enabled: true
    openfeign:
      sentinel:
        enabled: true
      client:
        config:
          im-user-service:
            connectTimeout: ${IM_USER_CONNECT_TIMEOUT_MS:300}
            readTimeout: ${IM_USER_READ_TIMEOUT_MS:800}
          im-social-service:
            connectTimeout: ${IM_SOCIAL_CONNECT_TIMEOUT_MS:300}
            readTimeout: ${IM_SOCIAL_READ_TIMEOUT_MS:800}
    nacos:
      discovery:
        enabled: ${IM_NACOS_ENABLED:false}
        server-addr: ${IM_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${IM_NACOS_NAMESPACE:public}
        group: ${IM_NACOS_DISCOVERY_GROUP:IM_SERVICE}
        username: ${IM_NACOS_USERNAME:nacos}
        password: ${IM_NACOS_PASSWORD:nacos}
        register-enabled: ${IM_NACOS_REGISTER_ENABLED:${IM_NACOS_ENABLED:false}}
        metadata:
          version: ${im.instance.version:${IM_INSTANCE_VERSION:1.0.0-SNAPSHOT}}
          zone: ${im.instance.zone:${IM_INSTANCE_ZONE:default}}
          protocol: ${im.instance.protocol:netty-ws-http}
          startupTime: ${im.instance.startup-time:unknown}
      config:
        enabled: ${IM_NACOS_ENABLED:false}
        server-addr: ${IM_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${IM_NACOS_NAMESPACE:public}
        group: ${IM_NACOS_SHARED_GROUP:IM_PLATFORM}
        username: ${IM_NACOS_USERNAME:nacos}
        password: ${IM_NACOS_PASSWORD:nacos}
        file-extension: yaml
        refresh-enabled: false
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: ${IM_SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: ${IM_SENTINEL_PORT:8719}
#        shared-configs:
#          - data-id: im-shared.yaml
#            group: ${IM_NACOS_SHARED_GROUP:IM_PLATFORM}
#            refresh: false
#        extension-configs:
#          - data-id: im-chat-server.yaml
#            group: ${IM_NACOS_SERVICE_GROUP:IM_SERVICE}
#            refresh: false
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${IM_DB_URL:jdbc:mysql://127.0.0.1:3306/im_chat?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${IM_DB_USERNAME:root}
    password: ${IM_DB_PASSWORD:root}
    druid:
      initial-size: ${IM_DB_POOL_INITIAL_SIZE:5}
      min-idle: ${IM_DB_POOL_MIN_IDLE:5}
      max-active: ${IM_DB_POOL_MAX_ACTIVE:20}
      max-wait: 30000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  data:
    redis:
      host: ${IM_REDIS_HOST:127.0.0.1}
      port: ${IM_REDIS_PORT:6379}
      password: ${IM_REDIS_PASSWORD:}
      database: ${IM_REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 1
          max-wait: 3000ms

server:
  port: ${SERVER_PORT:0}
  forward-headers-strategy: framework

management:
  endpoints:
    enabled-by-default: false
  endpoint:
    health:
      enabled: true
      show-details: always
  health:
    defaults:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

mybatis:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ming.imchatserver.dao
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

rocketmq:
  name-server: ${IM_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${IM_ROCKETMQ_PRODUCER_GROUP:im-chat-producer-group}
  consumer:
    group: ${IM_ROCKETMQ_CONSUMER_GROUP:im-chat-consumer-group}

redisson:
  single-server-config:
    address: ${IM_REDISSON_ADDRESS:redis://127.0.0.1:6379}
    password: ${IM_REDISSON_PASSWORD:}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId:-na} %msg%n"
  level:
    root: INFO
    com.ming.imchatserver: INFO

im:
  instance:
    version: ${IM_INSTANCE_VERSION:1.0.0-SNAPSHOT}
    zone: ${IM_INSTANCE_ZONE:default}
    protocol: netty-ws-http
  observability:
    trace:
      header-name: ${IM_TRACE_HEADER_NAME:X-Trace-Id}
      generate-if-missing: true
    access-log-enabled: ${IM_ACCESS_LOG_ENABLED:true}
  platform:
    config:
      shared-data-id: im-shared.yaml
      service-data-id: im-chat-server.yaml
      hot-refresh-safe-prefixes:
        - im.observability.trace
        - im.observability.access-log-enabled
  netty:
    enabled: ${IM_NETTY_ENABLED:true}
    port: ${IM_NETTY_PORT:8080}
    websocket-path: /ws
    reader-idle-seconds: 60
    writer-idle-seconds: 0
    all-idle-seconds: 120
    max-content-length: ${im.file.max-file-size-bytes:10485760}
    offline-pull-max-limit: 200
    single-chat-require-active-contact: false
    group-push-batch-size: 200
    group-push-parallelism: 4
    group-push-queue-capacity: 1000
    message-recall-window-seconds: 120
    origin-check-enabled: false
    origin-whitelist:
      - http://localhost:5173
      - http://127.0.0.1:5173
  reliability:
    relay-batch-size: 100
    relay-fixed-delay-ms: 1000
    processing-timeout-ms: 30000
    max-retry-count: 8
    dispatch-topic: im.msg.dispatch
  sensitive:
    enabled: false
    mode: REJECT
    word-source: classpath:sensitive_words.txt
    fail-open: true
  file:
    local-base-dir: data/uploads
    public-url-prefix: /files
    max-file-size-bytes: 10485760
    upload-token-expire-seconds: 900
    download-sign-secret: ${IM_FILE_DOWNLOAD_SIGN_SECRET:PLEASE_REPLACE_FILE_DOWNLOAD_SECRET}
    download-sign-expire-seconds: 300
    download-sign-one-time: false
    allow-owner-download-without-message: true
  redis:
    server-id: ${HOSTNAME:im-chat-server}
    presence-ttl-seconds: 180
    client-msg-id-ttl-seconds: 600
  rate-limit:
    message-send:
      limit: 120
      window-seconds: 60
    file-upload:
      limit: 30
      window-seconds: 60
    file-download:
      limit: 60
      window-seconds: 60
  metrics:
    sample-fixed-delay-ms: 10000
    log-fixed-delay-ms: 60000
  route:
    social:
      single-chat-permission-cache-ttl-seconds: ${IM_ROUTE_SOCIAL_SINGLE_CHAT_PERMISSION_CACHE_TTL_SECONDS:15}
      contact-active-cache-ttl-seconds: ${IM_ROUTE_SOCIAL_CONTACT_ACTIVE_CACHE_TTL_SECONDS:15}
      group-member-ids-cache-ttl-seconds: ${IM_ROUTE_SOCIAL_GROUP_MEMBER_IDS_CACHE_TTL_SECONDS:5}
      group-recall-permission-cache-ttl-seconds: ${IM_ROUTE_SOCIAL_GROUP_RECALL_PERMISSION_CACHE_TTL_SECONDS:5}
