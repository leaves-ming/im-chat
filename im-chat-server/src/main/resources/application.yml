spring:
  application:
    name: im-chat-server
  profiles:
    active: dev
  main:
    # 单端口 Netty 模式：禁用 Spring MVC/Tomcat
    web-application-type: none
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.215.2:3306/im_chat?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 114514
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 30000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 114514
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 1
          max-wait: 3000ms

# 若保留 Spring MVC（REST 登录接口），可将 server.port 设为非 0 并把 web-application-type 改为 servlet
server:
  port: ${SERVER_PORT:0}
  forward-headers-strategy: framework

mybatis:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ming.imchatserver.dao
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: im-chat-producer-group
  consumer:
    group: im-chat-consumer-group

logging:
  level:
    root: INFO
    com.ming.imchatserver: DEBUG

im:
  auth:
    jwt:
      secret: PLEASE_REPLACE_JWT_SECRET
  netty:
    port: 8080
    websocket-path: /ws
    reader-idle-seconds: 60
    writer-idle-seconds: 0
    all-idle-seconds: 120
    max-content-length: 65536
    token-expire-seconds: 3600
    offline-pull-max-limit: 200
    origin-check-enabled: false
    origin-whitelist:
      - http://localhost:5173
      - http://127.0.0.1:5173
  reliability:
    relay-batch-size: 100
    relay-fixed-delay-ms: 1000
    max-retry-count: 8
    dispatch-topic: im.msg.dispatch
