spring:
  application:
    name: im-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  main:
    web-application-type: reactive
  config:
    import:
      - optional:nacos:im-shared.yaml?group=${IM_NACOS_SHARED_GROUP:IM_PLATFORM}
      - optional:nacos:im-gateway.yaml?group=${IM_NACOS_SERVICE_GROUP:IM_SERVICE}
  cloud:
    compatibility-verifier:
      enabled: true
    nacos:
      discovery:
        enabled: ${IM_NACOS_ENABLED:false}
        server-addr: ${IM_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${IM_NACOS_NAMESPACE:public}
        group: ${IM_NACOS_DISCOVERY_GROUP:IM_SERVICE}
        username: ${IM_NACOS_USERNAME:nacos}
        password: ${IM_NACOS_PASSWORD:nacos}
        register-enabled: ${IM_NACOS_REGISTER_ENABLED:${IM_NACOS_ENABLED:false}}
        metadata:
          version: ${im.instance.version:${IM_INSTANCE_VERSION:1.0.0-SNAPSHOT}}
          zone: ${im.instance.zone:${IM_INSTANCE_ZONE:default}}
          protocol: ${im.instance.protocol:http-gateway}
          startupTime: ${im.instance.startup-time:unknown}
      config:
        enabled: ${IM_NACOS_ENABLED:false}
        server-addr: ${IM_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${IM_NACOS_NAMESPACE:public}
        group: ${IM_NACOS_SHARED_GROUP:IM_PLATFORM}
        username: ${IM_NACOS_USERNAME:nacos}
        password: ${IM_NACOS_PASSWORD:nacos}
        file-extension: yaml
        refresh-enabled: false
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: ${IM_SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: ${IM_SENTINEL_PORT:8720}
    gateway:
      routes:
        - id: im-message-service-http
          uri: lb://im-message-service
          predicates:
            - Path=/api/message/**
        - id: im-social-service-http
          uri: lb://im-social-service
          predicates:
            - Path=/api/social/**
        - id: im-chat-server-websocket
          uri: lb:ws://im-chat-server
          predicates:
            - Path=/ws
          filters:
            - SetPath=${im.gateway.backend-websocket-path}

server:
  port: ${SERVER_PORT:8088}
  forward-headers-strategy: framework

management:
  endpoints:
    enabled-by-default: false
  endpoint:
    health:
      enabled: true
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId:-na} %msg%n"
  level:
    root: INFO
    com.ming.imgateway: INFO

im:
  instance:
    version: ${IM_INSTANCE_VERSION:1.0.0-SNAPSHOT}
    zone: ${IM_INSTANCE_ZONE:default}
    protocol: http-ws-gateway
  gateway:
    trace-header-name: ${IM_TRACE_HEADER_NAME:X-Trace-Id}
    generate-trace-id-if-missing: true
    access-log-enabled: ${IM_ACCESS_LOG_ENABLED:true}
    introspect-enabled: ${IM_GATEWAY_INTROSPECT_ENABLED:true}
    relay-user-headers: ${IM_GATEWAY_RELAY_USER_HEADERS:true}
    websocket-path: /ws
    backend-websocket-path: /ws-internal
    gateway-proxy-header-name: X-IM-Gateway-Proxy
    gateway-proxy-header-value: im-gateway
    gateway-secret-header-name: X-IM-Gateway-Secret
    gateway-shared-secret: ${IM_GATEWAY_WS_SHARED_SECRET:PLEASE_REPLACE_GATEWAY_WS_SECRET}
    client-ip-header-name: X-IM-Client-IP
    protected-prefixes:
      - /api/message/
      - /api/social/
