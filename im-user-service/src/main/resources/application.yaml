spring:
  application:
    name: im-user-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import:
      - optional:nacos:im-shared.yaml?group=${IM_NACOS_SHARED_GROUP:IM_PLATFORM}
      - optional:nacos:im-user-service.yaml?group=${IM_NACOS_SERVICE_GROUP:IM_SERVICE}
  cloud:
    compatibility-verifier:
      enabled: true
    nacos:
      discovery:
        enabled: ${IM_NACOS_ENABLED:false}
        server-addr: ${IM_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${IM_NACOS_NAMESPACE:public}
        group: ${IM_NACOS_DISCOVERY_GROUP:IM_SERVICE}
        username: ${IM_NACOS_USERNAME:nacos}
        password: ${IM_NACOS_PASSWORD:nacos}
        register-enabled: ${IM_NACOS_REGISTER_ENABLED:${IM_NACOS_ENABLED:false}}
        metadata:
          version: ${im.instance.version:${IM_INSTANCE_VERSION:1.0.0-SNAPSHOT}}
          zone: ${im.instance.zone:${IM_INSTANCE_ZONE:default}}
          protocol: http
          startupTime: ${im.instance.startup-time:unknown}
      config:
        enabled: ${IM_NACOS_ENABLED:false}
        server-addr: ${IM_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${IM_NACOS_NAMESPACE:public}
        group: ${IM_NACOS_SHARED_GROUP:IM_PLATFORM}
        username: ${IM_NACOS_USERNAME:nacos}
        password: ${IM_NACOS_PASSWORD:nacos}
        file-extension: yaml
        refresh-enabled: true
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: ${IM_SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: ${IM_SENTINEL_PORT:8722}
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${IM_DB_URL:jdbc:mysql://127.0.0.1:3306/im_chat?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${IM_DB_USERNAME:root}
    password: ${IM_DB_PASSWORD:root}
  data:
    redis:
      host: ${IM_REDIS_HOST:127.0.0.1}
      port: ${IM_REDIS_PORT:6379}
      password: ${IM_REDIS_PASSWORD:}
      database: ${IM_REDIS_DATABASE:0}
      timeout: 3000ms

server:
  port: ${SERVER_PORT:0}
  forward-headers-strategy: framework

management:
  endpoints:
    enabled-by-default: false
  endpoint:
    health:
      enabled: true
      show-details: always

logging:
  level:
    root: INFO
    com.ming.imuserservice: INFO

im:
  instance:
    version: ${IM_INSTANCE_VERSION:1.0-SNAPSHOT}
    zone: ${IM_INSTANCE_ZONE:default}
  user:
    jwt:
      secret: ${IM_AUTH_JWT_SECRET:PLEASE_REPLACE_JWT_SECRET}
      expire-seconds: ${IM_AUTH_JWT_EXPIRE_SECONDS:3600}
      issuer: ${IM_AUTH_JWT_ISSUER:im-user-service}
    login-risk:
      ip:
        limit: ${IM_USER_LOGIN_RISK_IP_LIMIT:20}
        window-seconds: ${IM_USER_LOGIN_RISK_IP_WINDOW_SECONDS:300}
      device:
        limit: ${IM_USER_LOGIN_RISK_DEVICE_LIMIT:20}
        window-seconds: ${IM_USER_LOGIN_RISK_DEVICE_WINDOW_SECONDS:300}
      username:
        limit: ${IM_USER_LOGIN_RISK_USERNAME_LIMIT:10}
        window-seconds: ${IM_USER_LOGIN_RISK_USERNAME_WINDOW_SECONDS:300}
